; YokWare Branch v0.9 — copy / edit; first run also writes %LocalAppData%\DarkwoodMP\config.ini
; Both (all) players need the SAME WorldSeed and should each start a NEW game for matching worlds.

[Network]
; Host machine IP (or 127.0.0.1 for same-PC testing / dedicated on localhost)
ServerIp = "127.0.0.1"
; UDP port (default 7777) — open firewall for multi-PC
ServerPort = 7777
; Optional session password (leave empty for open)
SessionPassword = ""

[Player]
; Display name in chat / HUD
PlayerName = "Player"

[World]
; CRITICAL: same non-zero seed on every peer for co-op world layout.
; 0 = random (worlds will desync). Change this together if you want a different map.
WorldSeed = 12345

[Gameplay]
; Personal loot scale: Off | Double | ScaleWithPlayers
LootShareMode = "ScaleWithPlayers"
; Scale allowlisted dream NPCs by party size
NamedNpcScaleEnabled = true
NamedNpcAllowlist = "ChomperBlack"

[UI]
; Multiplayer menu toggle (Unity KeyCode name)
MenuKey = "F1"
; Chat: hold Left Control and press C (when connected)

[Debug]
; true = high-frequency net/entity lines: [YokWare][VERBOSE][…]
; Filter normal playtest with: Session, Join, World, SyncCheck, ERROR
VerboseLogging = false
